[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

# Proxy API (auth côté serveur) — même chemin qu’en dev Vite
[[redirects]]
  from = "/api/siri/vehicle-monitoring.json"
  to = "/.netlify/functions/vehicle-monitoring"
  status = 200
  force = true

[[redirects]]
  from = "/api/traffic/*"
  to = "/.netlify/functions/road-traffic"
  status = 200
  force = true

# SPA React
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[dev]
  command = "npm run dev"
  targetPort = 5173
  port = 8888
  autoLaunch = true
